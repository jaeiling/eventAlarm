<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>페이지 만들기 - 모행</title>
  <link rel="stylesheet" th:href="@{/css/common.css}"/>
</head>
<body>
<div class="page-wrap">

  <header class="top-bar">
    <a th:href="@{/}" class="back-btn">← 홈</a>
    <span class="top-bar-title">페이지 만들기</span>
  </header>

  <main class="form-container">
    <div class="form-card">
      <div class="form-icon">🏫</div>
      <h1 class="form-title">우리 페이지 생성</h1>
      <p class="form-desc">페이지를 생성하면 <strong>6자리 관리 번호</strong>가 발급돼요.<br/>이 번호로 행사를 등록·수정·삭제할 수 있으니 꼭 저장해두세요!</p>

      <form th:action="@{/admin/create}" th:object="${dto}" method="post" class="form-body">

        <div class="form-group">
          <label class="form-label">소속 <span class="required">*</span></label>
          <input type="text" th:field="*{universityName}"
                 class="form-input" placeholder="예: 인천대학교"
                 th:classappend="${#fields.hasErrors('universityName')} ? 'input-error' : ''"/>
          <span class="form-error" th:if="${#fields.hasErrors('universityName')}" th:errors="*{universityName}"></span>
        </div>

        <div class="form-group">
          <label class="form-label">이름 <span class="required">*</span></label>
          <input type="text" th:field="*{departmentName}"
                 class="form-input" placeholder="예: 정보통신공학과, 멋쟁이사자처럼"
                 th:classappend="${#fields.hasErrors('departmentName')} ? 'input-error' : ''"/>
          <span class="form-error" th:if="${#fields.hasErrors('departmentName')}" th:errors="*{departmentName}"></span>
        </div>

        <div class="form-group">
          <label class="form-label">소개 <span class="form-hint">(선택 · 페이지 상단에 표시)</span></label>
          <textarea th:field="*{description}" class="form-textarea" rows="3"
                    placeholder="예: 인천대학교 정보통신공학과입니다. 최신 행사 소식을 여기서 확인하세요."></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-full">페이지 생성하기 →</button>
      </form>
    </div>
  </main>

</div>
</body>
</html>
