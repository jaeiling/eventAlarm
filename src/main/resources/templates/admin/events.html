<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>행사 관리 - 모행</title>
  <link rel="stylesheet" th:href="@{/css/common.css}"/>
</head>
<body>
<div class="page-wrap">

  <header class="top-bar">
    <a th:href="@{/}" class="back-btn">← 홈</a>
    <span class="top-bar-title" th:text="${page.universityName + ' ' + page.departmentName}">학과명</span>
    <a th:href="@{'/page/' + ${page.slug}}" class="top-bar-link" target="_blank">공개 페이지 🔗</a>
  </header>

  <main class="admin-wrap">

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <!-- 새 행사 등록 버튼 -->
    <a th:href="@{'/admin/' + ${page.id} + '/events/new'}" class="btn btn-primary btn-full" style="font-size:16px; padding:15px;">
      + 새 행사 등록
    </a>

    <!-- 행사 목록 -->
    <section class="admin-section">
      <h2 class="section-heading">등록된 행사 · 공지</h2>

      <!-- 빈 상태 -->
      <div th:if="${#lists.isEmpty(events)}" class="empty-state">
        <span>📭</span>
        등록된 행사가 없어요.
      </div>

      <!-- 목록 -->
      <ul class="admin-event-list" th:unless="${#lists.isEmpty(events)}">
        <li class="admin-event-item" th:each="event : ${events}">
          <div class="admin-event-info">
            <span class="admin-event-type-badge"
                  th:classappend="${event.postType == 'NOTICE'} ? 'badge-notice' : 'badge-event'"
                  th:text="${event.postType == 'NOTICE'} ? '공지' : '행사'">행사</span>
            <div class="admin-event-texts">
              <p class="admin-event-title" th:text="${event.title}">제목</p>
              <p class="admin-event-date" th:if="${event.eventDateTime != null}"
                 th:text="${#temporals.format(event.eventDateTime, 'MM.dd (E) HH:mm')}">날짜</p>
              <p class="admin-event-date" th:if="${event.eventDateTime == null}">날짜 없음</p>
            </div>
          </div>
          <div class="admin-event-actions">
            <a th:href="@{'/page/' + ${page.slug} + '/events/' + ${event.id} + '/edit'}"
               class="btn-admin-action btn-edit">수정</a>
            <form th:action="@{'/admin/' + ${page.id} + '/events/' + ${event.id} + '/delete'}"
                  method="post" onsubmit="return confirm('정말 삭제하시겠어요?')">
              <button type="submit" class="btn-admin-action btn-delete">삭제</button>
            </form>
          </div>
        </li>
      </ul>
    </section>

  </main>
</div>
</body>
</html>
